<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スレッド - 掲示板</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header">
    <div class="header-inner">
      <h1>📋猿2ch</h1>
      <span class="header-sub"><a href="index.html">← スレッド一覧に戻る</a></span>
    </div>
  </div>

  <div id="main">
    <div id="thread-title-bar">
      <span id="thread-title-text">読み込み中…</span>
    </div>

    <!-- 投稿フォーム（上） -->
    <div id="post-form">
      <div class="form-title">✏️ 返信する</div>
      <div class="form-row">
        <input type="text" id="post-name" placeholder="名前（省略で名無しさん）" maxlength="32">
        <input type="text" id="post-trip" placeholder="#トリップ（任意）" maxlength="16">
      </div>
      <div class="form-row">
        <textarea id="post-body" placeholder="本文を入力（Shift+Enterで改行）" maxlength="1000" rows="4"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitPost();}"></textarea>
      </div>
      <div class="form-row form-actions">
        <span id="post-count-label"></span>
        <button id="btn-post" onclick="submitPost()">書き込む</button>
      </div>
      <div id="post-form-msg" class="form-msg"></div>
    </div>

    <!-- 投稿一覧 -->
    <div id="post-list">
      <div class="loading">読み込み中…</div>
    </div>

    <!-- 投稿フォーム（下） -->
    <div class="post-form-bottom-link">
      <a href="#post-form">▲ 上の書き込みフォームへ</a>
    </div>
  </div>

  <div id="footer">
    <a href="index.html">← 板トップへ</a>
    &nbsp;|&nbsp;
    <a href="https://github.com" target="_blank">GitHub Pages</a> + Firebase でできた掲示板
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp,
             doc, getDoc, updateDoc, increment, runTransaction }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== ★ここにあなたのFirebase設定を貼る★ =====
const firebaseConfig = {
  apiKey: "AIzaSyBKxyTHd_WFV1PpF-eaTl2U_-WMXFKaUXw",
  authDomain: "ch-83859.firebaseapp.com",
  projectId: "ch-83859",
  storageBucket: "ch-83859.firebasestorage.app",
  messagingSenderId: "709758774996",
  appId: "1:709758774996:web:0e1cc6e143af4ac4745541",
  measurementId: "G-N87ZLQZC1Z"
};
    // =================================================

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(location.search);
    const board = params.get("board") || "general";
    const threadId = params.get("id");

    if (!threadId) {
      document.getElementById("thread-title-text").textContent = "スレッドが見つかりません";
    }

    // トリップ生成
    async function generateTrip(key) {
      if (!key) return "";
      const encoder = new TextEncoder();
      const data = encoder.encode(key);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const b64 = btoa(String.fromCharCode(...hashArray));
      return "◆" + b64.replace(/[+/=]/g, "").slice(0, 10);
    }

    function formatDate(ts) {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}(${["日","月","火","水","木","金","土"][d.getDay()]}) ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
    }

    // アンカーリンク変換 >>1 など
    function convertAnchors(html) {
      return html.replace(/&gt;&gt;(\d+)/g, (_, n) =>
        `<a class="anchor-link" href="#post-${n}" onclick="highlightPost(${n})">&gt;&gt;${n}</a>`
      );
    }

    window.highlightPost = function(n) {
      const el = document.getElementById(`post-${n}`);
      if (!el) return;
      el.classList.add("highlight");
      setTimeout(() => el.classList.remove("highlight"), 1500);
    };

    // スレッドタイトル取得
    async function loadThreadTitle() {
      const threadRef = doc(db, "boards", board, "threads", threadId);
      const snap = await getDoc(threadRef);
      if (snap.exists()) {
        const t = snap.data();
        document.title = t.title + " - 掲示板";
        document.getElementById("thread-title-text").textContent = t.title;
      }
    }

    // 投稿一覧リアルタイム
    function loadPosts() {
      const postList = document.getElementById("post-list");
      const q = query(
        collection(db, "boards", board, "threads", threadId, "posts"),
        orderBy("no", "asc")
      );

      onSnapshot(q, (snapshot) => {
        postList.innerHTML = "";
        let count = 0;
        snapshot.forEach(docSnap => {
          const p = docSnap.data();
          count++;
          const div = document.createElement("div");
          div.className = "post-block";
          div.id = `post-${p.no}`;
          div.innerHTML = `
            <div class="post-header">
              <span class="post-no">${p.no}</span>
              <span class="post-name">${escapeHtml(p.name || "名無しさん")}</span>
              <span class="post-date">${formatDate(p.createdAt)}</span>
              <span class="post-id">ID:${p.uid || "??????"}</span>
            </div>
            <div class="post-body">${convertAnchors(escapeHtml(p.body || ""))}</div>
          `;
          postList.appendChild(div);
        });
        document.getElementById("post-count-label").textContent = `全 ${count} レス`;
      });
    }

    // 投稿送信
    window.submitPost = async function() {
      const nameRaw = document.getElementById("post-name").value.trim();
      const tripKey = document.getElementById("post-trip").value.replace(/^#/, "").trim();
      const body = document.getElementById("post-body").value.trim();
      const msg = document.getElementById("post-form-msg");

      if (!body) { msg.textContent = "本文を入力してください"; return; }

      const btn = document.getElementById("btn-post");
      btn.disabled = true;
      msg.textContent = "送信中…";

      try {
        const trip = await generateTrip(tripKey);
        const name = nameRaw || "名無しさん";
        const displayName = trip ? `${name}${trip}` : name;

        // 簡易UID（セッション内固定）
        let uid = sessionStorage.getItem("uid");
        if (!uid) {
          uid = Math.random().toString(36).slice(2, 10).toUpperCase();
          sessionStorage.setItem("uid", uid);
        }

        const threadRef = doc(db, "boards", board, "threads", threadId);

        await runTransaction(db, async (tx) => {
          const threadSnap = await tx.get(threadRef);
          if (!threadSnap.exists()) throw new Error("スレッドが見つかりません");
          const currentCount = threadSnap.data().postCount || 0;
          const nextNo = currentCount + 1;

          const postRef = doc(collection(db, "boards", board, "threads", threadId, "posts"));
          tx.set(postRef, {
            no: nextNo,
            name: displayName,
            body,
            uid,
            createdAt: serverTimestamp(),
          });
          tx.update(threadRef, {
            postCount: nextNo,
            lastPostAt: serverTimestamp(),
          });
        });

        document.getElementById("post-body").value = "";
        msg.textContent = "投稿しました！";
        setTimeout(() => msg.textContent = "", 3000);
      } catch(e) {
        console.error(e);
        msg.textContent = "エラー: " + e.message;
      }
      btn.disabled = false;
    };

    if (threadId) {
      loadThreadTitle();
      loadPosts();
    }
  </script>
</body>
</html>
